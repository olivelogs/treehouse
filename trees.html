<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chime — Olive (trees)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #0a1a1f;
    --reef-dark: #0f2b33;
    --reef-mid: #164049;
    --teal: #1a7a6d;
    --teal-light: #2aa89a;
    --amber: #d4a054;
    --amber-soft: #c4935a;
    --amber-glow: #e8b86a;
    --sand: #c8b89a;
    --sand-light: #ddd2be;
    --biolum: #4aeadc;
    --biolum-soft: rgba(74, 234, 220, 0.15);
    --text: #d4cfc6;
    --text-bright: #eae5dc;
    --text-dim: #8a8578;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    background: var(--deep);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(26, 122, 109, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(212, 160, 84, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(74, 234, 220, 0.03) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 1;
  }

  a {
    color: var(--amber);
    text-decoration: none;
    transition: color 0.3s ease;
  }
  a:hover { color: var(--amber-glow); }

  /* ── Navigation ── */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, var(--deep), transparent);
  }

  nav .name {
    font-family: 'Lora', serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text-bright);
    letter-spacing: 0.02em;
  }

  nav .links {
    display: flex;
    gap: 2.5rem;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  nav .links a {
    color: var(--text-dim);
    position: relative;
  }
  nav .links a:hover { color: var(--text-bright); }
  nav .links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--amber);
    transition: width 0.3s ease;
  }
  nav .links a:hover::after { width: 100%; }

  /* ── Hero ── */
  .hero {
    position: relative;
    min-height: 120vh;
    display: flex;
    align-items: center;
    padding: 0 8vw;
    z-index: 2;
  }

  .hero-content {
    max-width: 640px;
    animation: fadeUp 1.2s ease-out;
  }

  .hero h1 {
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: clamp(2.2rem, 4.5vw, 3.2rem);
    color: var(--text-bright);
    line-height: 1.3;
    margin-bottom: 1.8rem;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--amber);
  }

  .hero p {
    font-size: 1rem;
    max-width: 540px;
    margin-bottom: 1rem;
  }

  .glow-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, var(--biolum), transparent);
    margin: 2.5rem 0;
    opacity: 0.6;
  }

  /* ── Sections ── */
  section {
    position: relative;
    z-index: 2;
    padding: 5rem 8vw;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1rem;
  }

  section h2 {
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: clamp(1.5rem, 2.8vw, 2rem);
    color: var(--text-bright);
    margin-bottom: 1.5rem;
    line-height: 1.35;
  }

  section p {
    max-width: 600px;
    margin-bottom: 1.2rem;
    font-size: 0.95rem;
  }

  .section-border {
    border-top: 1px solid rgba(74, 234, 220, 0.08);
  }

  /* ── Quote blocks ── */
  .quote-block {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--sand);
    max-width: 520px;
    margin: 2.5rem 0;
    padding-left: 1.5rem;
    border-left: 2px solid rgba(212, 160, 84, 0.25);
    line-height: 1.65;
  }

  .quote-block .attribution {
    display: block;
    font-family: 'Jost', sans-serif;
    font-style: normal;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.6rem;
    letter-spacing: 0.04em;
  }

  /* ── The Voice / Sample Library ── */
  .voice-section {
    border-top: 1px solid rgba(74, 234, 220, 0.08);
  }

  .sample-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    margin-top: 2.5rem;
  }

  .sample-card {
    background: linear-gradient(135deg, rgba(22, 64, 73, 0.25), rgba(15, 43, 51, 0.35));
    border: 1px solid rgba(74, 234, 220, 0.08);
    border-radius: 8px;
    padding: 1.8rem;
    transition: all 0.4s ease;
  }

  .sample-card:hover {
    border-color: rgba(74, 234, 220, 0.18);
  }

  .sample-name {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--amber-soft);
    margin-bottom: 0.4rem;
  }

  .sample-description {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .sample-meta {
    font-size: 0.72rem;
    color: var(--teal);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* ── Audio player ── */
  .audio-player {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(212, 160, 84, 0.4);
    background: rgba(212, 160, 84, 0.08);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .play-btn:hover {
    border-color: var(--amber);
    background: rgba(212, 160, 84, 0.15);
  }

  .play-btn svg {
    width: 12px;
    height: 12px;
    fill: var(--amber);
    margin-left: 2px;
  }

  .play-btn.playing svg {
    margin-left: 0;
  }

  .waveform-bar {
    flex: 1;
    height: 3px;
    background: rgba(74, 234, 220, 0.1);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .waveform-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--amber));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  .audio-time {
    font-size: 0.7rem;
    color: var(--text-dim);
    min-width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── Spectrogram section ── */
  .spectrogram-section {
    border-top: 1px solid rgba(74, 234, 220, 0.08);
  }

  .spectrogram-container {
    margin-top: 2rem;
    max-width: 700px;
  }

  .spectrogram-container img {
    width: 100%;
    border-radius: 6px;
    border: 1px solid rgba(74, 234, 220, 0.08);
    opacity: 0.92;
  }

  .spectrogram-caption {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-top: 0.8rem;
    line-height: 1.6;
    font-style: italic;
  }

  /* ── Architecture section ── */
  .architecture-section {
    border-top: 1px solid rgba(74, 234, 220, 0.08);
  }

  .arch-diagram {
    margin: 2rem 0;
    padding: 2rem;
    background: rgba(15, 43, 51, 0.3);
    border: 1px solid rgba(74, 234, 220, 0.08);
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    color: var(--text-dim);
    max-width: 500px;
  }

  .arch-flow {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    line-height: 2.2;
  }

  .arch-node {
    padding: 0.3rem 0.8rem;
    border: 1px solid rgba(74, 234, 220, 0.15);
    border-radius: 4px;
    color: var(--text);
    font-size: 0.8rem;
    white-space: nowrap;
  }

  .arch-node.highlight {
    border-color: var(--amber);
    color: var(--amber);
  }

  .arch-arrow {
    color: var(--teal);
    font-size: 0.9rem;
  }

  /* ── Conversation excerpt ── */
  .conversation-section {
    border-top: 1px solid rgba(74, 234, 220, 0.08);
  }

  .conversation {
    max-width: 560px;
    margin-top: 2rem;
  }

  .conv-line {
    margin-bottom: 1.2rem;
    font-size: 0.92rem;
    line-height: 1.65;
  }

  .conv-line .speaker {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }

  .conv-line .speaker.olive { color: var(--teal); }
  .conv-line .speaker.claude { color: var(--amber); }

  .conv-line .action {
    font-style: italic;
    color: var(--text-dim);
  }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 2;
    padding: 3rem 8vw;
    border-top: 1px solid rgba(74, 234, 220, 0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  footer .footer-links {
    display: flex;
    gap: 2rem;
  }

  footer a { color: var(--text-dim); }
  footer a:hover { color: var(--text); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease-out;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    nav { padding: 1.2rem 1rem; }
    nav .links { gap: 1rem; font-size: 0.75rem; }
    .hero { padding: 6rem 2rem; }
    section { padding: 3.5rem 2rem; }
    .sample-grid { grid-template-columns: 1fr; }
    footer {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="name">Olive (trees)</a>
  <div class="links">
    <a href="index.html">Home</a>
  </div>
</nav>

<!-- ═══ HERO ═══ -->
<div class="hero">
  <div class="hero-content">
    <h1>musings</h1>
    <p>I am, occasionally, a writer of worlds. Or poems.</p>
    <p>In the rare event I deem something internet-worthy, I just might put it here.</p>
    <p>Still being built.</p>
    <div class="glow-line"></div>
    </div>
  </div>
</div>



<footer>
  <span>&copy; 2026 Olive</span>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="https://github.com/olivelogs">GitHub</a>
  </div>
</footer>

<script>
  // Fade-in observer
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
